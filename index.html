<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAIN9 • 16×16</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  body, html { margin:0; padding:0; background:#000; color:#0f0; font-family:monospace; text-align:center; overflow:hidden; height:100vh; touch-action:none; user-select:none; -webkit-user-select:none; display:flex; flex-direction:column; }
  h1 { margin:8px 0 4px; font-size:1.8rem; }
  canvas { image-rendering:pixelated; border:6px solid #0f0; background:#001100; margin:8px auto; display:block; max-width:95vw; max-height:52vh; box-shadow:0 0 20px #0f0; }
  
  .info-bar { display:flex; justify-content:space-between; font-size:17px; margin:4px 12px; flex-wrap:wrap; gap:8px; }
  #inventoryDisplay { font-size:17px; color:#ff0; margin:4px 12px; text-align:left; }

  .controls { margin:12px auto 8px; display:flex; justify-content:center; }
  .dpad { display:grid; grid-template-columns: repeat(3, 1fr); width: 220px; gap:8px; }
  .dpad button { font-size:38px; height:64px; background:#111; color:#0f0; border:4px solid #0f0; }
  .slash-btn { font-size:26px; height:64px; background:#330; border-color:#f44; color:#ff0; }

  button { font-size:22px; padding:10px 18px; margin:4px; background:#111; color:#0f0; border:4px solid #0f0; }
  .copybtn { font-size:17px; padding:8px 16px; }

  #status, #seedDisplay { font-size:18px; margin:6px 12px; min-height:26px; }
  #battleLog { 
    font-size:15.5px; line-height:1.35; max-height:138px; overflow-y:auto; 
    background:#001100; border:3px solid #0f0; padding:10px; margin:8px 12px; 
    text-align:left; color:#0f0; flex-grow:1; min-height:80px;
  }

  .step { border:4px solid #0f0; padding:12px; margin:12px; text-align:left; background:#001100; }
  .orange-box { border-color:#ff8c00 !important; }
  .orange-box h3 { color:#ff8c00; }
  textarea { width:100%; height:110px; background:#001100; color:#0f0; font-family:monospace; font-size:15px; line-height:1.4; overflow-x:auto; border:3px solid #0f0; resize:none; }

  @media (max-width: 520px) {
    canvas { max-height:46vh; }
    .dpad { width: 200px; }
    .dpad button { height:58px; font-size:34px; }
    h1 { font-size:1.55rem; }
    #battleLog { max-height:110px; font-size:14.5px; }
  }
</style>
</head>
<body>
<h1>KAIN9 — 16×16</h1>

<!-- NAME SCREEN -->
<div id="nameScreen">
  <h2>ENTER YOUR NAME</h2>
  <input id="playerName" type="text" value="Kain" maxlength="12"><br><br>
  <button onclick="setNameAndContinue()">CONTINUE TO ROLE</button>
</div>

<!-- ROLE CHOICE -->
<div id="start" style="display:none">
  <button onclick="startRole('host')">I AM HOST (Orange H)</button><br><br>
  <button onclick="startRole('joiner')">I AM JOINER (Green J)</button>
</div>

<!-- SIGNALING -->
<div id="signaling" style="display:none; max-width:580px; margin:0 auto; padding:6px; flex:1; display:flex; flex-direction:column;">
  <div id="status">Kain9 • Generating SDP...</div>

  <!-- CODE BOX -->
  <div id="codeSection" class="step orange-box" style="display:none">
    <h3 id="codeTitle">YOUR CODE — send this blob to friend</h3>
    <textarea id="localSDP" readonly></textarea>
    <button class="copybtn" onclick="copySDP()">📋 COPY CODE</button>
  </div>

  <!-- PASTE BOX -->
  <div id="pasteSection" class="step" style="display:none; flex:1; display:flex; flex-direction:column;">
    <h3 id="pasteTitle">PASTE FRIEND'S CODE</h3>
    <textarea id="remoteSDP" placeholder="K9H-XXXXX-XXXXX-... or K9J-..." spellcheck="false" autocorrect="off" autocapitalize="none" style="flex:1"></textarea>
    <button onclick="connect()" style="margin-top:10px">CONNECT</button>
  </div>
</div>

<!-- GAME -->
<div id="game" style="display:none; flex-direction:column; flex:1; width:100%; max-width:620px; margin:0 auto;">
  <div id="seedDisplay">WORLD SEED: <span id="seedValue" style="color:#ff0"></span></div>
  <div id="status">CONNECTED • SLASH YOUR FRIEND</div>
  
  <div class="info-bar">
    <span id="myInfo">YOU: Kain (HP 10/10)</span>
    <span id="otherInfo">FRIEND: ??? (HP 10/10)</span>
  </div>

  <div id="inventoryDisplay">BADGES: none</div>
  
  <canvas id="c" width="480" height="480"></canvas>
  
  <div class="controls">
    <div class="dpad">
      <div></div>
      <button onclick="move(0,-1)">↑</button>
      <div></div>
      
      <button onclick="move(-1,0)">←</button>
      <button onclick="slash()" class="slash-btn">SLASH</button>
      <button onclick="move(1,0)">→</button>
      
      <div></div>
      <button onclick="move(0,1)">↓</button>
      <div></div>
    </div>
  </div>

  <div style="margin:4px 12px;">
    <button onclick="copySeed()">COPY WORLD SEED</button>
    <button onclick="showLoadSeed()">LOAD WORLD SEED</button>
  </div>

  <div id="battleLog"></div>
</div>

<!-- LOAD SEED OVERLAY -->
<div id="loadSeedOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:100; padding:20px; box-sizing:border-box; display:flex; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:520px; background:#001100; border:6px solid #0f0; padding:20px;">
    <h3>PASTE WORLD SAVE SEED</h3>
    <textarea id="loadSeedInput" style="height:140px; width:100%;" spellcheck="false" autocorrect="off" autocapitalize="none"></textarea><br><br>
    <button onclick="loadSeed()">LOAD & RESTORE</button>
    <button onclick="hideLoadSeed()" style="background:#330;">CANCEL</button>
  </div>
</div>

<script>
// ====================== KAIN9 CORE ======================
const SIZE = 16;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let myRole = null;
let myName = '';
let otherName = '???';
let myPos = {x:8, y:8};
let otherPos = null;
let myHealth = 10;
let otherHealth = 10;
let xp = 0;
let level = 1;
let inventory = [];
let tick = 0;
let pc, dc;
let myLetter, myColor, otherLetter, otherColor;

let lastFrame = 0;
const TARGET_FPS = 30;
const FRAME_TIME = 1000 / TARGET_FPS;

let battleMessages = [];

// ====================== BATTLE LOG ======================
function battleLog(msg) {
  battleMessages.unshift(msg);
  if (battleMessages.length > 10) battleMessages.pop();
  const logEl = document.getElementById('battleLog');
  logEl.innerHTML = battleMessages.join('<br>');
  logEl.scrollTop = 0;
}

// ====================== BITCOIN-STYLE ROBUST SDP BLOB ======================
function simpleChecksum(str) {
  let sum = 0;
  for (let i = 0; i < str.length; i++) {
    sum = (sum * 31 + str.charCodeAt(i)) % 65536;
  }
  return sum.toString(36).toUpperCase().padStart(4, '0');
}

function encodeSDP(desc) {
  const json = JSON.stringify({type: desc.type, sdp: desc.sdp});
  let b64 = btoa(json);
  let safe = b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  const checksum = simpleChecksum(safe);
  const full = safe + checksum;
  const chunks = full.match(/.{1,8}/g) || [];
  const prefix = myRole === 'host' ? 'K9H-' : 'K9J-';
  return prefix + chunks.join('-');
}

function decodeSDP(str) {
  let clean = str.trim().replace(/[^A-Za-z0-9\-_]/g, '').toUpperCase();
  if (!clean.startsWith('K9')) throw new Error('Missing K9 prefix');
  clean = clean.slice(3).replace(/-/g, '');   // remove K9X-
  if (clean.length < 8) throw new Error('Code too short');
  const data = clean.slice(0, -4);
  const chk = clean.slice(-4);
  if (chk !== simpleChecksum(data)) throw new Error('Checksum failed — re-paste?');
  let b64 = data.replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  return JSON.parse(atob(b64));
}

// ====================== WORLD SEED ======================
function generateWorldSeed() {
  const state = {x:myPos.x, y:myPos.y, mh:myHealth, oh:otherHealth, inv:inventory.map(i=>i.name).join('|')};
  let b64 = btoa(JSON.stringify(state)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  b64 = b64.slice(0,28).padEnd(28,'0');
  let sum = b64.split('').reduce((a,c)=>a + c.charCodeAt(0),0) % 36;
  return 'K9' + b64 + sum.toString(36).toUpperCase();
}

// ====================== WEBRTC ======================
function setupWebRTC() { /* unchanged except finalizeSDP call */ 
  pc = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}, {urls: 'stun:stun1.l.google.com:19302'}] });
  pc.onicecandidate = e => { if (!e.candidate) finalizeSDP(); };
  pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') finalizeSDP(); };

  if (myRole === 'host') {
    dc = pc.createDataChannel('kain9');
    setupDataChannel(dc);
    pc.createOffer().then(o => pc.setLocalDescription(o));
  } else {
    pc.ondatachannel = e => { dc = e.channel; setupDataChannel(dc); };
  }
  setTimeout(finalizeSDP, 1800);
}

function finalizeSDP() {
  if (!pc || !pc.localDescription) return;
  const code = encodeSDP(pc.localDescription);
  document.getElementById('localSDP').value = code;
  document.getElementById('status').innerHTML = `✅ CODE READY — send the K9 blob`;
}

function setupDataChannel(channel) { /* unchanged */ 
  channel.onopen = () => {
    document.getElementById('signaling').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    document.getElementById('status').innerHTML = `KAIN9 LINKED • ${myRole.toUpperCase()}`;
    lockdown();
    sendMsg({type: 'name', name: myName});
    sendMsg({type: 'fullState', state: {myName, myPos, myHealth, otherName, otherPos, otherHealth, xp, level, inventory}});
  };
  channel.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'move') otherPos = msg;
    if (msg.type === 'name') otherName = msg.name;
    if (msg.type === 'slash') {
      myHealth = Math.max(0, myHealth - 2);
      battleLog('YOU WERE SLASHED!');
      if (myHealth <= 0) battleLog('YOU WERE DEFEATED!');
      sendMsg({type: 'healthUpdate', health: myHealth});
    }
    if (msg.type === 'healthUpdate') otherHealth = msg.health;
    if (msg.type === 'fullState') {
      otherName = msg.state.otherName || otherName;
      otherPos = msg.state.otherPos || otherPos;
      otherHealth = msg.state.otherHealth || otherHealth;
      inventory = msg.state.inventory || inventory;
    }
    draw();
  };
}

function sendMsg(obj) {
  if (dc && dc.readyState === 'open') dc.send(JSON.stringify(obj));
}

// ====================== NAME & ROLE ======================
function setNameAndContinue() {
  myName = document.getElementById('playerName').value.trim() || 'Kain';
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('start').style.display = 'block';
}

async function startRole(role) {
  myRole = role;
  myLetter = role === 'host' ? 'H' : 'J';
  myColor = role === 'host' ? '#ff8c00' : '#0f0';
  otherLetter = role === 'host' ? 'J' : 'H';
  otherColor = role === 'host' ? '#0f0' : '#ff8c00';

  myHealth = 10; otherHealth = 10; xp = 0; level = 1; inventory = [];

  document.getElementById('start').style.display = 'none';
  document.getElementById('signaling').style.display = 'flex';
  document.getElementById('status').innerHTML = 'Kain9 • Generating SDP...';

  document.getElementById('codeSection').style.display = role === 'host' ? 'block' : 'none';
  document.getElementById('pasteSection').style.display = 'block';

  setupWebRTC();
  requestAnimationFrame(gameLoop);
}

// ====================== CONNECT ======================
async function connect() {
  let raw = document.getElementById('remoteSDP').value;
  if (!raw) return battleLog('Paste the K9 code first');

  try {
    const desc = decodeSDP(raw);
    const remoteType = myRole === 'host' ? 'answer' : 'offer';
    await pc.setRemoteDescription({type: remoteType, sdp: desc.sdp});

    if (myRole === 'joiner') {
      battleLog('HOST CODE OK — generating answer');
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      document.getElementById('pasteSection').style.display = 'none';
      document.getElementById('codeSection').style.display = 'block';
      document.getElementById('codeTitle').textContent = 'YOUR ANSWER CODE';
      finalizeSDP();
      battleLog('ANSWER READY — send the K9 blob');
    } else {
      battleLog('CONNECTED!');
    }
  } catch (e) {
    battleLog('BAD CODE: ' + e.message);
  }
}

function copySDP() {
  const txt = document.getElementById('localSDP').value.trim();
  if (!txt) return battleLog('Still generating...');
  navigator.clipboard.writeText(txt).then(() => battleLog('CODE COPIED ✓'));
}

// ====================== GAMEPLAY (unchanged except draw calls) ======================
function move(dx, dy) {
  myPos.x = Math.max(0, Math.min(SIZE-1, myPos.x + dx));
  myPos.y = Math.max(0, Math.min(SIZE-1, myPos.y + dy));
  sendMsg({type: 'move', x: myPos.x, y: myPos.y});
  draw();
}

function slash() {
  if (!otherPos || Math.abs(myPos.x - otherPos.x) > 1 || Math.abs(myPos.y - otherPos.y) > 1) return;
  sendMsg({type: 'slash'});
  otherHealth = Math.max(0, otherHealth - 2);
  battleLog('SLASH HIT!');
  if (otherHealth <= 0) {
    battleLog(`DEFEATED ${otherName}!`);
    inventory.push({type: 'badge', name: otherName});
    battleLog(`BADGE ACQUIRED: ${otherName}`);
  }
  sendMsg({type: 'healthUpdate', health: otherHealth});
  draw();
}

function draw() { /* unchanged */ 
  ctx.fillStyle = '#001100';
  ctx.fillRect(0, 0, 480, 480);
  ctx.strokeStyle = '#003300';
  for (let i = 0; i <= SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i*30, 0); ctx.lineTo(i*30, 480);
    ctx.moveTo(0, i*30); ctx.lineTo(480, i*30);
    ctx.stroke();
  }
  ctx.fillStyle = myColor;
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(myLetter, myPos.x*30 + 15, myPos.y*30 + 15);
  if (otherPos) {
    ctx.fillStyle = otherColor;
    ctx.fillText(otherLetter, otherPos.x*30 + 15, otherPos.y*30 + 15);
  }

  document.getElementById('myInfo').textContent = `${myName} (HP ${myHealth}/10)`;
  document.getElementById('otherInfo').textContent = `${otherName} (HP ${otherHealth}/10)`;
  document.getElementById('seedValue').textContent = generateWorldSeed();

  const badges = inventory.filter(i => i.type === 'badge').map(i => i.name).join(', ') || 'none';
  document.getElementById('inventoryDisplay').innerHTML = `BADGES: ${badges}`;
  
  document.getElementById('status').innerHTML = 
    `TICK ${tick} | ME:(${myPos.x},${myPos.y}) | OTHER: ${otherPos ? `(${otherPos.x},${otherPos.y})` : '??'}`;
}

function gameLoop(now) {
  if (!lastFrame) lastFrame = now;
  if (now - lastFrame >= FRAME_TIME) {
    tick++;
    draw();
    lastFrame = now;
  }
  requestAnimationFrame(gameLoop);
}

// Keyboard (unchanged)
document.addEventListener('keydown', e => {
  if (!myRole) return;
  if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move(-1,0);
  if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move(1,0);
  if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') move(0,-1);
  if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') move(0,1);
  if (e.key === ' ' || e.key === 'Enter') slash();
});

// ====================== LOCKDOWN ======================
function lockdown() {
  document.addEventListener('gesturestart', e => e.preventDefault(), {passive:false});
  document.addEventListener('touchmove', e => {if(e.touches.length>1)e.preventDefault();}, {passive:false});
  document.body.style.overflow = 'hidden';
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(()=>{});
}

// ====================== SEED FUNCTIONS (unchanged) ======================
function copySeed() {
  navigator.clipboard.writeText(generateWorldSeed()).then(() => battleLog('WORLD SEED COPIED'));
}
function showLoadSeed() { document.getElementById('loadSeedOverlay').style.display = 'flex'; }
function hideLoadSeed() { document.getElementById('loadSeedOverlay').style.display = 'none'; }
function loadSeed() {
  let raw = document.getElementById('loadSeedInput').value;
  let input = raw.trim().replace(/[^A-Za-z0-9]/g,'');
  hideLoadSeed();
  if (!input) return;
  try {
    let clean = input.replace('K9','').slice(0,29);
    let b64 = clean.slice(0,-1);
    const state = JSON.parse(atob(b64.replace(/-/g,'+').replace(/_/g,'/').padEnd(28,'=')));
    myPos = {x:state.x||8, y:state.y||8};
    myHealth = Math.max(0, state.mh||10);
    otherHealth = Math.max(0, state.oh||10);
    inventory = (state.inv||'').split('|').filter(Boolean).map(name => ({type:'badge', name}));
    if (dc && dc.readyState === 'open') sendMsg({type:'fullState', state:{myPos, myHealth, otherHealth, inventory}});
    battleLog('WORLD RESTORED');
    draw();
  } catch(e) { battleLog('BAD SEED'); }
}

window.onload = () => {};   // no more real-time paste cleaning
</script>
</body>
</html>
