<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAIN9 • 16×16</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  body, html { margin:0; padding:0; background:#000; color:#0f0; font-family:monospace; text-align:center; overflow:hidden; height:100vh; touch-action:none; user-select:none; -webkit-user-select:none; }
  canvas { image-rendering:pixelated; border:8px solid #0f0; background:#001100; margin:10px auto; display:block; max-width:95vw; max-height:60vh; }
  button { font-size:28px; padding:14px 28px; margin:6px; background:#111; color:#0f0; border:4px solid #0f0; }
  #status { font-size:19px; margin:12px; min-height:32px; }
  textarea { width:92%; height:180px; background:#001100; color:#0f0; border:4px solid #0f0; font-family:monospace; font-size:15px; margin:8px auto; display:block; line-height:1.4; }
  .copybtn { font-size:18px; padding:8px 16px; margin:4px; }
</style>
</head>
<body>
<h1>KAIN9 — 16×16</h1>

<div id="start">
  <button onclick="startRole('host')">I AM HOST (Green H)</button><br><br>
  <button onclick="startRole('joiner')">I AM JOINER (Red J)</button>
</div>

<div id="signaling" style="display:none; max-width:560px; margin:0 auto; padding:10px;">
  <div id="status">Kain9 • Generating SDP...</div>
  
  <h3 id="stepTitle">YOUR SDP CODE (send to friend)</h3>
  <textarea id="localSDP" readonly></textarea>
  <button class="copybtn" onclick="copySDP()">📋 COPY CODE</button><br><br>

  <button onclick="forceGenerate()" style="background:#330;">FORCE GENERATE</button><br><br>

  <h3>Paste friend’s SDP CODE here:</h3>
  <textarea id="remoteSDP" placeholder="Paste the grouped code here..."></textarea><br>
  <button onclick="connect()">CONNECT</button>
</div>

<div id="game" style="display:none">
  <div id="status">CONNECTED • SLASH YOUR FRIEND</div>
  <canvas id="c" width="480" height="480"></canvas><br>
  <button onclick="move(-1,0)">←</button>
  <button onclick="move(0,-1)">↑</button>
  <button onclick="move(0,1)">↓</button>
  <button onclick="move(1,0)">→</button>
  <button onclick="slash()" style="margin-left:30px">SLASH</button>
</div>

<script>
// ====================== KAIN9 CORE ======================
const SIZE = 16;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let myRole = null;
let myPos = {x:8, y:8};
let otherPos = null;
let tick = 0;
let pc, dc;
let myLetter, myColor, otherLetter, otherColor;

// ====================== BROWSER LOCKDOWN ======================
function lockdown() {
  document.addEventListener('gesturestart', e => e.preventDefault(), {passive:false});
  document.addEventListener('touchmove', e => {if(e.touches.length>1)e.preventDefault();}, {passive:false});
  document.body.style.overflow = 'hidden';
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(()=>{});
}

// ====================== SIMPLE BASE64 GROUPED SDP ======================
function encodeSDP(desc) {
  const json = JSON.stringify({type: desc.type, sdp: desc.sdp});
  const b64 = btoa(json);
  return b64.match(/.{1,40}/g).join(' ');
}

function decodeSDP(str) {
  const b64 = str.replace(/\s/g, '');
  const json = atob(b64);
  return JSON.parse(json);
}

// ====================== WEBRTC ======================
function setupWebRTC() {
  pc = new RTCPeerConnection({
    iceServers: [
      {urls: 'stun:stun.l.google.com:19302'},
      {urls: 'stun:stun1.l.google.com:19302'},
      {urls: 'stun:stun2.l.google.com:19302'},
      {urls: 'stun:stun3.l.google.com:19302'}
    ]
  });

  pc.onicecandidate = e => { if (!e.candidate) finalizeSDP(); };
  pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') finalizeSDP(); };

  if (myRole === 'host') {
    dc = pc.createDataChannel('kain9');
    setupDataChannel(dc);
    pc.createOffer().then(o => pc.setLocalDescription(o));
  } else {
    pc.ondatachannel = e => { dc = e.channel; setupDataChannel(dc); };
  }

  // safety poll
  setTimeout(finalizeSDP, 1200);
  setTimeout(finalizeSDP, 3000);
}

function finalizeSDP() {
  if (!pc || !pc.localDescription) return;
  const code = encodeSDP(pc.localDescription);
  document.getElementById('localSDP').value = code;
  document.getElementById('status').innerHTML = `✅ ${myRole.toUpperCase()} code ready — send to friend`;
}

function setupDataChannel(channel) {
  channel.onopen = () => {
    document.getElementById('signaling').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('status').innerHTML = `KAIN9 LINKED • ${myRole.toUpperCase()}`;
    lockdown();
    setInterval(() => { tick++; draw(); }, 180);
  };
  channel.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'move') otherPos = {x: msg.x, y: msg.y};
    if (msg.type === 'slash' && otherPos) {
      if (Math.abs(myPos.x - otherPos.x) <= 1 && Math.abs(myPos.y - otherPos.y) <= 1) alert('SLASH HIT!');
    }
    draw();
  };
}

function sendMsg(obj) {
  if (dc?.readyState === 'open') dc.send(JSON.stringify(obj));
}

// ====================== ROLE & SIGNALING ======================
async function startRole(role) {
  myRole = role;
  myLetter = role === 'host' ? 'H' : 'J';
  myColor = role === 'host' ? '#0f0' : '#f00';
  otherLetter = role === 'host' ? 'J' : 'H';
  otherColor = role === 'host' ? '#f00' : '#0f0';

  document.getElementById('start').style.display = 'none';
  document.getElementById('signaling').style.display = 'block';
  document.getElementById('localSDP').value = '';
  document.getElementById('status').innerHTML = 'Kain9 • Generating SDP...';
  document.getElementById('stepTitle').textContent = role === 'host' ? 'SEND this SDP CODE' : 'PASTE HOST SDP CODE';

  setupWebRTC();
  requestAnimationFrame(draw);
}

function forceGenerate() {
  document.getElementById('status').innerHTML = 'Forcing SDP generation...';
  finalizeSDP();
}

function copySDP() {
  const txt = document.getElementById('localSDP').value;
  if (!txt) return alert('Wait or click FORCE GENERATE');
  navigator.clipboard.writeText(txt).then(() => {
    const b = document.querySelector('.copybtn');
    const old = b.textContent; b.textContent = '✅ COPIED';
    setTimeout(() => b.textContent = old, 1400);
  });
}

async function connect() {
  let input = document.getElementById('remoteSDP').value.trim();
  if (!input) return alert('Paste the SDP code');
  try {
    const desc = decodeSDP(input);
    const type = myRole === 'host' ? 'answer' : 'offer';
    await pc.setRemoteDescription({type, sdp: desc.sdp});
    if (myRole === 'joiner') {
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      finalizeSDP(); // show our answer code
    }
  } catch (e) {
    alert('Bad SDP code — double-check every character or ask friend to re-send');
    console.error(e);
  }
}

// ====================== GAMEPLAY ======================
function move(dx, dy) {
  myPos.x = Math.max(0, Math.min(SIZE-1, myPos.x + dx));
  myPos.y = Math.max(0, Math.min(SIZE-1, myPos.y + dy));
  sendMsg({type: 'move', x: myPos.x, y: myPos.y});
  draw();
}

function slash() {
  sendMsg({type: 'slash'});
  if (otherPos && Math.abs(myPos.x - otherPos.x) <= 1 && Math.abs(myPos.y - otherPos.y) <= 1) alert('SLASH HIT!');
}

function draw() {
  ctx.fillStyle = '#001100';
  ctx.fillRect(0, 0, 480, 480);
  ctx.strokeStyle = '#003300';
  for (let i = 0; i <= SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i*30, 0); ctx.lineTo(i*30, 480);
    ctx.moveTo(0, i*30); ctx.lineTo(480, i*30);
    ctx.stroke();
  }
  ctx.fillStyle = myColor;
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(myLetter, myPos.x*30 + 15, myPos.y*30 + 15);
  if (otherPos) {
    ctx.fillStyle = otherColor;
    ctx.fillText(otherLetter, otherPos.x*30 + 15, otherPos.y*30 + 15);
  }
  tick++;
  document.getElementById('status').innerHTML = 
    `TICK ${tick} | ME:(${myPos.x},${myPos.y}) | OTHER: ${otherPos ? `(${otherPos.x},${otherPos.y})` : '??'}`;
}

document.addEventListener('keydown', e => {
  if (!myRole) return;
  if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move(-1,0);
  if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move(1,0);
  if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') move(0,-1);
  if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') move(0,1);
  if (e.key === ' ' || e.key === 'Enter') slash();
});
</script>
</body>
</html>
